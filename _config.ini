[SRT]
# SRT 로그인 정보
USER_ID = 
USER_PASS = 

[ROUTE]
# 출발역 / 도착역 (역명 그대로 입력)
# 가능한 역: 수서, 동탄, 평택지제, 천안아산, 오송, 대전, 서대구, 동대구, 경주, 포항,
#            울산(통도사), 밀양, 부산, 마산, 창원, 창원중앙, 진영, 진주, 김천(구미),
#            광주송정, 나주, 목포, 익산, 전주, 정읍, 남원, 구례구, 곡성, 순천, 여수EXPO,
#            여천, 공주
SOURCE = 수서
DESTINATION = 광주송정

[SCHEDULE]
# 날짜: YYYYMMDD 형식 (예: 20260320)
DATE = 20260320
# 시작시간: HH0000 형식 (예: 12시 = 120000)
START_TIME = 180000
# 종료시간: HH0000 형식 (예: 23시 = 230000)
END_TIME = 190000

[SEAT]
# 좌석 타입 (아래 중 하나를 입력)
#   일반실 우선 = General / Priority
#   일반실만    = General Only
#   특실 우선   = Special / Priority
#   특실만      = Special Only
TYPE = General / Priority

[INTERVAL]
# 조회 간격 랜덤 범위 (초 단위)
MIN_SEC = 10
MAX_SEC = 15

[TELEGRAM]
# 텔레그램 알림 설정 (선택사항, 비워두면 알림 없이 동작)
BOT_TOKEN = 
CHAT_ID = 
